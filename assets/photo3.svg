<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="for" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- Forest background -->
  <rect width="800" height="600" fill="url(#for)"/>
  <!-- Sun rays through trees -->
  <rect x="350" y="0" width="30" height="400" fill="white" opacity="0.08"/>
  <rect x="380" y="0" width="20" height="350" fill="white" opacity="0.06"/>
  <rect x="320" y="0" width="25" height="380" fill="white" opacity="0.05"/>
  <!-- Trees -->
  <g fill="#1b5e20">
    <polygon points="100,200 60,400 140,400"/>
    <polygon points="100,230 70,350 130,350"/>
    <rect x="95" y="390" width="10" height="20" fill="#5d4037"/>
  </g>
  <g fill="#2e7d32">
    <polygon points="250,150 200,400 300,400"/>
    <polygon points="250,180 215,350 285,350"/>
    <rect x="245" y="390" width="10" height="20" fill="#5d4037"/>
  </g>
  <g fill="#1b5e20">
    <polygon points="400,120 340,400 460,400"/>
    <polygon points="400,155 355,350 445,350"/>
    <rect x="395" y="390" width="10" height="20" fill="#5d4037"/>
  </g>
  <g fill="#2e7d32">
    <polygon points="550,180 500,400 600,400"/>
    <polygon points="550,210 515,350 585,350"/>
    <rect x="545" y="390" width="10" height="20" fill="#5d4037"/>
  </g>
  <g fill="#1b5e20">
    <polygon points="680,200 630,400 730,400"/>
    <polygon points="680,230 648,350 712,350"/>
    <rect x="675" y="390" width="10" height="20" fill="#5d4037"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="200" fill="#33691e"/>
  <rect x="0" y="400" width="800" height="10" fill="#558b2f" opacity="0.5"/>
  <!-- Path -->
  <ellipse cx="400" cy="500" rx="150" ry="30" fill="#8d6e63" opacity="0.4"/>
  <!-- Small flowers -->
  <circle cx="200" cy="470" r="3" fill="#ff4081"/>
  <circle cx="350" cy="480" r="2.5" fill="#ffeb3b"/>
  <circle cx="500" cy="465" r="3" fill="#ff4081"/>
  <circle cx="600" cy="475" r="2" fill="#ffeb3b"/>
</svg>
