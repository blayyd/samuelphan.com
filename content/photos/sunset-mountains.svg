<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9a3c"/>
      <stop offset="100%" stop-color="#ff6f3c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <circle cx="680" cy="80" r="45" fill="url(#sun)" opacity="0.9"/>
  <rect x="0" y="280" width="800" height="170" fill="#1a3a5c"/>
  <ellipse cx="400" cy="290" rx="500" ry="30" fill="#0d2137"/>
  <polygon points="0,300 100,220 200,300" fill="#2d5a27"/>
  <polygon points="120,300 220,180 320,300" fill="#1e4d1e"/>
  <polygon points="250,300 350,200 450,300" fill="#2d5a27"/>
  <polygon points="380,300 480,160 580,300" fill="#1e4d1e"/>
  <polygon points="520,300 620,210 720,300" fill="#2d5a27"/>
  <polygon points="650,300 720,240 800,300" fill="#1e4d1e"/>
  <!-- stars -->
  <circle cx="100" cy="50" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="240" cy="30" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="70" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="470" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="550" cy="55" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="90" r="1" fill="white" opacity="0.5"/>
  <circle cx="310" cy="45" r="1" fill="white" opacity="0.7"/>
  <!-- water reflection -->
  <rect x="650" y="310" width="6" height="20" rx="3" fill="#ff9a3c" opacity="0.15"/>
  <rect x="670" y="305" width="8" height="30" rx="4" fill="#ff9a3c" opacity="0.1"/>
  <rect x="690" y="315" width="4" height="12" rx="2" fill="#ff9a3c" opacity="0.12"/>
</svg>
